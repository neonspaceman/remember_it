version: v2
managed:
  enabled: true
  disable:
    - module: buf.build/bufbuild/protovalidate
  override:
    - file_option: go_package_prefix
      value: card/gen/go
clean: true
plugins:
  - local: protoc-gen-go
    out: gen/go
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen/go
    opt: paths=source_relative
