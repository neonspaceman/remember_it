version: "3"

dotenv: [".env"]

vars:
  TOOLS_IMAGE: remember-it-tools
  TOOLS_DOCKERFILE: ../tools/Dockerfile
  TOOLS_CONTEXT: ..
  GOOSE_DSN: 'postgres "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DATABASE}?sslmode=disable"'

tasks:
  default:
    desc: Show commands descriptions
    cmds:
      - task --list
    silent: true

  up:
    desc: Start bot and miniapp
    cmds:
      - docker compose up -d

  down:
    desc: Stop bot and miniapp
    cmds:
      - docker compose down

  restart:
    desc: Restart bot and miniapp (rebuilds from mounted code)
    cmds:
      - docker compose restart telegram-bot telegram-miniapp

  rebuild:
    desc: Rebuild image and recreate bot and miniapp (after Dockerfile/go.mod change)
    cmds:
      - docker compose up -d --build telegram-bot telegram-miniapp

  database-create:
    desc: Create database
    dir: ../infrastructure
    cmds:
      - >-
        PGPASSWORD=$POSTGRES_PASSWORD docker exec $(docker compose ps -q postgresql)
        psql -U $POSTGRES_USER -tc "SELECT 1 FROM pg_database WHERE datname='$POSTGRES_DATABASE'" | grep -q 1
        || PGPASSWORD=$POSTGRES_PASSWORD docker exec $(docker compose ps -q postgresql)
        psql -U $POSTGRES_USER -c "CREATE DATABASE $POSTGRES_DATABASE"

  tools-build:
    desc: Build the shared tools image (goose, protoc)
    cmds:
      - docker build -t {{.TOOLS_IMAGE}} -f {{.TOOLS_DOCKERFILE}} {{.TOOLS_CONTEXT}}

  migrate-up:
    desc: Execute migrations
    deps: [tools-build]
    cmds:
      - >-
        docker run --rm --network $DOCKER_NETWORK_NAME
        --env-file .env --volume .:/app
        {{.TOOLS_IMAGE}} sh -c '/go/bin/goose -dir migrations {{.GOOSE_DSN}} up'

  migrate-down:
    desc: Rollback migration
    deps: [tools-build]
    cmds:
      - >-
        docker run --rm --network $DOCKER_NETWORK_NAME
        --env-file .env --volume .:/app
        {{.TOOLS_IMAGE}} sh -c '/go/bin/goose -dir migrations {{.GOOSE_DSN}} down'

  migrate-create:
    desc: "Create new migration. Example: task migrate-create name=<NAME>"
    deps: [tools-build]
    cmds:
      - >-
        docker run --rm --user $(id -u):$(id -g)
        --volume .:/app
        {{.TOOLS_IMAGE}} /go/bin/goose -dir migrations create {{.name}} sql
