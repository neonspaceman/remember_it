version: "3"

dotenv: [".env"]

vars:
  TOOLS_IMAGE: remember-it-tools
  TOOLS_DOCKERFILE: ../tools/Dockerfile
  TOOLS_CONTEXT: ..
  GOOSE_DSN: 'postgres "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DATABASE}?sslmode=disable"'

tasks:
  default:
    desc: Show commands descriptions
    cmds:
      - task --list
    silent: true

  up:
    desc: Start service
    cmds:
      - docker compose up -d

  down:
    desc: Stop service
    cmds:
      - docker compose down

  restart:
    desc: Restart service (rebuilds from mounted code)
    cmds:
      - docker compose restart card

  rebuild:
    desc: Rebuild image and recreate service (after Dockerfile/go.mod change)
    cmds:
      - docker compose up -d --build card

  database-create:
    desc: Create database
    dir: ../infrastructure
    cmds:
      - >-
        PGPASSWORD=$POSTGRES_PASSWORD docker exec $(docker compose ps -q postgresql)
        psql -U $POSTGRES_USER -tc "SELECT 1 FROM pg_database WHERE datname='$POSTGRES_DATABASE'" | grep -q 1
        || PGPASSWORD=$POSTGRES_PASSWORD docker exec $(docker compose ps -q postgresql)
        psql -U $POSTGRES_USER -c "CREATE DATABASE $POSTGRES_DATABASE"

  tools-build:
    desc: Build the shared tools image (goose, buf)
    cmds:
      - docker build -t {{.TOOLS_IMAGE}} -f {{.TOOLS_DOCKERFILE}} {{.TOOLS_CONTEXT}}

  migrate-up:
    desc: Execute migrations
    deps: [tools-build]
    cmds:
      - >-
        docker run --rm --network $DOCKER_NETWORK_NAME
        --env-file .env --volume .:/app
        {{.TOOLS_IMAGE}} sh -c '/go/bin/goose -dir migrations {{.GOOSE_DSN}} up'

  migrate-down:
    desc: Rollback migration
    deps: [tools-build]
    cmds:
      - >-
        docker run --rm --network $DOCKER_NETWORK_NAME
        --env-file .env --volume .:/app
        {{.TOOLS_IMAGE}} sh -c '/go/bin/goose -dir migrations {{.GOOSE_DSN}} down'

  migrate-create:
    desc: "Create new migration. Example: task migrate-create name=<NAME>"
    deps: [tools-build]
    cmds:
      - >-
        docker run --rm --user $(id -u):$(id -g)
        --volume .:/app
        {{.TOOLS_IMAGE}} /go/bin/goose -dir migrations create {{.name}} sql

  proto-lint:
    desc: Lint proto files
    deps: [tools-build]
    cmds:
      - >-
        docker run --rm --user $(id -u):$(id -g) --volume .:/app
        --env BUF_CACHE_DIR=/tmp/buf-cache
        {{.TOOLS_IMAGE}} sh -c 'cd proto && /go/bin/buf lint'

  proto-dep-update:
    desc: Update proto dependencies (buf.lock)
    deps: [tools-build]
    cmds:
      - >-
        docker run --rm --user $(id -u):$(id -g) --volume .:/app
        --env BUF_CACHE_DIR=/tmp/buf-cache
        {{.TOOLS_IMAGE}} sh -c 'cd proto && /go/bin/buf dep update'

  proto-generate:
    desc: Generate all proto files
    deps: [tools-build]
    cmds:
      - >-
        docker run --rm --user $(id -u):$(id -g) --volume .:/app
        --env BUF_CACHE_DIR=/tmp/buf-cache
        --env PATH=/go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        {{.TOOLS_IMAGE}} /go/bin/buf generate proto
